[install]
minimumReleaseAge = 604800  # 7 days in seconds (7 × 24 × 60 × 60)

# Use the text-based bun.lock instead of the legacy binary bun.lockb.
# Required so Roster (laravel/boost dependency) can scan npm packages —
# its BunPackageLock scanner only reads bun.lock, not bun.lockb.

saveTextLockfile = true

[security]
allowGlobalScanner =  false
